<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>取得経路テスター</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23087653'/%3E%3Cpath d='M7 22c4-9 10-12 18-8-2 7-9 11-18 8Z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Source fetch test</p>
      <h1>取得経路テスター</h1>
      <p class="description">選択した媒体だけを取得し、見出し・リンク・日時・サムネイルを検証します。</p>
    </header>

    <section class="controls" aria-label="テスト対象">
      <label for="sourceSelect">取得先</label>
      <select id="sourceSelect"></select>
      <button id="runButton" type="button">この媒体だけテスト</button>
    </section>

    <section id="status" class="status" data-status="idle" aria-live="polite">
      <strong>待機中</strong>
      <span>テスト対象を選択してください。</span>
    </section>

    <dl id="metrics" class="metrics" hidden></dl>
    <section id="results" class="results" aria-label="取得結果"></section>
  </main>
  <!-- 公開フロント設定をテスト定義と共有し、API URLや公開キーの二重管理を避ける。 -->
  <script src="../shared/portal-core.js?v=20260717-title-hydration"></script>
  <script src="../international/config.js?v=20260715-fetch-common"></script>
  <script type="module" src="./app.js?v=20260715-fetch-common"></script>
</body>
</html>
