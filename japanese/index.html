<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>競馬ニュース早見ポータル</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1 id="pageTitle">競馬ニュース早見ポータル</h1>
          <p id="subtitle" class="subtitle">主要紙のヘッドラインを3日分だけ拾って時系列で確認</p>
        </div>
        <div class="controls" role="search">
          <label class="search-wrap">
            <span id="searchLabel" class="visually-hidden">ヘッドライン検索</span>
            <input id="searchInput" type="search" placeholder="見出し・媒体名で検索" autocomplete="off">
          </label>
          <button id="refreshButton" type="button">更新</button>
          <details id="settingsDetails" class="settings-dropdown">
            <summary class="settings-summary">
              <span id="settingsSummaryLabel">設定</span>
              <span id="currentSettingsLabel" class="settings-current">3日以内 / ライト</span>
            </summary>
            <div class="settings-menu" aria-label="表示設定">
              <label class="toggle-row">
                <span id="darkModeLabel">ダークモード</span>
                <input id="darkModeToggle" type="checkbox" role="switch" aria-label="ダークモード">
              </label>
              <label class="setting-group">
                <span id="languageSettingLabel" class="setting-label">表示言語</span>
                <select id="languageSelect" class="language-select" aria-label="表示言語">
                  <option value="ja">日本語</option>
                  <option value="en">English</option>
                </select>
              </label>
              <div class="setting-group">
                <div id="daysSettingLabel" class="setting-label">取得対象の日数</div>
                <div id="daysOptions" class="segmented-control" role="group" aria-label="取得対象の日数"></div>
              </div>
            </div>
          </details>
        </div>
      </div>
    </header>

    <section class="filter-area" aria-label="ニュース絞り込み">
      <details id="filterDetails" class="filter-dropdown">
        <summary class="filter-summary">
          <span id="filterSummaryLabel">絞り込み</span>
          <span id="currentFilterLabel" class="filter-current">全サイト</span>
        </summary>
        <div class="filter-menu">
          <div class="filter-group">
            <div id="siteFilterLabel" class="filter-label">サイト</div>
            <nav id="siteTabs" class="site-tabs" aria-label="サイトフィルタ"></nav>
          </div>
        </div>
      </details>
    </section>

    <section class="status-grid" aria-live="polite">
      <div class="status-panel">
        <div id="statusLine" class="status-line">
          <strong>待機中</strong>
          <span>更新ボタンで最新ヘッドラインを取得します。</span>
        </div>
        <div id="errorList" class="error-list"></div>
      </div>
      <div id="siteSummary" class="summary-panel"></div>
    </section>

    <section id="newsList" class="news-list"></section>
    <section id="emptyState" class="empty-state">
      表示できるニュースがありません。検索条件を変えるか、更新を試してください。
    </section>
  </main>
  <script src="./app.js" defer></script>
</body>
</html>
