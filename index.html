<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horse Racing News Portal</title>
  <style>
    :root {
      --bg: #1D3063;
      --panel: #ffffff;
      --ink: #172018;
      --muted: #667066;
      --line: #dce3d9;
      --accent: #0e6f4f;
      --page-ink: #ffffff;
      --page-muted: rgba(255, 255, 255, 0.78);
      --shadow: 0 12px 28px rgba(23, 32, 24, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--page-ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(720px, calc(100% - 32px));
      display: grid;
      gap: 18px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
    }

    .lead {
      color: var(--page-muted);
      line-height: 1.7;
    }

    .links {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    a {
      min-height: 96px;
      padding: 18px;
      display: grid;
      align-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
    }

    a strong {
      color: var(--accent);
      font-size: 18px;
    }

    a span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Horse Racing News Portal</h1>
    <p class="lead">競馬ニュースを素早く確認するための個人向けポータルです。国内版と海外版を選んで開いてください。</p>
    <div class="links">
      <a href="./japanese/">
        <strong>日本競馬ニュース</strong>
        <span>主要国内メディアのヘッドラインを確認します。</span>
      </a>
      <a href="./international/">
        <strong>海外競馬ニュース</strong>
        <span>欧州、北米、豪州、ニュージーランド、香港のニュースを確認します。</span>
      </a>
    </div>
  </main>
</body>
</html>
